name: Package Skill

on:
  push:
  pull_request:

jobs:
  package-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml pytest

      - name: Generate skill manifest
        run: python scripts/generate-skill-manifest.py

      - name: Validate tests
        run: python -m pytest

      - name: Package .skill file
        run: python scripts/package-skill.py

      - name: Upload .skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: mingolf-cli-skill
          path: dist/mingolf-cli.skill
